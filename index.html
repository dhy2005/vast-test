<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Local VAST Test with IMA SDK</title>
  <style>
    #videoContainer {
      position: relative;
      width: 640px;
      height: 360px;
      background-color: black;
    }
    video {
      width: 100%;
      height: 100%;
    }
    #adContainer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #requestAdsBtn {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
  <!-- Load IMA SDK -->
  <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js"></script>
</head>
<body>
  <h2>VAST Test</h2>
  <P>Can I use IMA in a http web page?</P>
  <div id="videoContainer">
    <video id="contentElement" controls preload="auto">
      <source src="plutotv-launching.mp4" type="video/mp4">
    </video>
    <div id="adContainer"></div>
  </div>

  <!-- Button to trigger ad request -->
  <button id="requestAdsBtn">Request Ads</button>

  <script>
    const videoContent = document.getElementById('contentElement');
    const adContainer = document.getElementById('adContainer');
    const requestAdsBtn = document.getElementById('requestAdsBtn');

    const adDisplayContainer = new google.ima.AdDisplayContainer(adContainer, videoContent);
    const adsLoader = new google.ima.AdsLoader(adDisplayContainer);

    // Handle ads manager loaded
    adsLoader.addEventListener(
      google.ima.AdsManagerLoadedEvent.Type.ADS_MANAGER_LOADED,
      (event) => {
        const adsManager = event.getAdsManager(videoContent);
        adsManager.init(640, 360, google.ima.ViewMode.NORMAL);
        adsManager.start();
      },
      false
    );

    // Handle ad errors
    adsLoader.addEventListener(
      google.ima.AdErrorEvent.Type.AD_ERROR,
      (event) => {
        console.error("Ad Error:", event.getError());
        videoContent.play(); // fallback to content
      },
      false
    );

    // Button click triggers ad request
    requestAdsBtn.addEventListener("click", () => {
      adDisplayContainer.initialize(); // must be called via user action
      const adsRequest = new google.ima.AdsRequest();
      adsRequest.adTagUrl = "https://dhy2005.github.io/vast-test/example.xml"; // <-- Your local VAST file
      adsLoader.requestAds(adsRequest);
    });
  </script>
</body>
</html>
